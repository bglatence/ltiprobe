name: Tests ping-tool

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Mettre a jour pip
        run: python -m pip install --upgrade pip

      - name: Installer les dependances
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Nettoyer les caches Python
        run: |
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true

      - name: Lancer pytest
        run: pytest -v

      - name: Verifier ping-tool
        run: ping-tool --version