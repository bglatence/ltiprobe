name: Tests ping-tool

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v5

      - name: Installer Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Nettoyer les caches Python
        run: |
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -delete 2>/dev/null || true

      # - name: Debug — structure du projet
      #   run: |
      #     echo "=== Fichiers test_core.py ==="
      #     find . -name "test_core.py" | grep -v venv
      #     echo "=== Racine du projet ==="
      #     ls -la
      #     echo "=== Dossiers ==="
      #     find . -maxdepth 2 -type d | grep -v venv | grep -v ".git"

      - name: Ruff — verification style
        run: ruff check .

      - name: Mypy — verification types
        run: mypy ping_tool/ --ignore-missing-imports

      - name: Lancer pytest
        run: pytest -v

      - name: Verifier ping-tool
        run: ping-tool --version