[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "ping-tool"
version = "0.1.0"
description = "Mesure les temps de reponse HTTP de sites web"
readme = "README.md"
requires-python = ">=3.8"
dependencies = ["tqdm>=4.0"]

[project.scripts]
ping-tool = "ping_tool.main:main"

[tool.setuptools.packages.find]
include = ["ping_tool*"]
