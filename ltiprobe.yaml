# ltiprobe — fichier de configuration
# Placez ce fichier à la racine du projet ou dans le répertoire de travail.

# Nombre de mesures par site
nb_mesures: 10

# Timeout HTTP en secondes
timeout: 10

# Langue d'affichage : FR (français) ou EN (anglais)
langue: EN

# Liste des sites à mesurer
# Chaque site peut définir un SLO (Service Level Objective) optionnel.
# Clés SLO disponibles :
#   http_p50_ms     — latence HTTP médiane (P50)
#   http_p75_ms     — latence HTTP P75
#   http_p90_ms     — latence HTTP P90
#   http_p95_ms     — latence HTTP P95
#   http_p99_ms     — latence HTTP P99
#   http_p999_ms    — latence HTTP P99.9
#   dns_ms          — latence DNS moyenne
#   stabilite_ratio — ratio p99/p50 (ex: 1.5 signifie p99 <= 1.5x p50)
#   icmp_ms         — latence ICMP (réseau) moyenne
#   tcp_ms          — latence handshake TCP moyenne
#   tls_ms          — latence handshake TLS moyenne
#   http_chaud_ms   — latence HTTP estimée keep-alive (sans TCP/TLS)
#   nb_hops_max     — nombre de hops maximum (requiert --traceroute)
#
# Assertions de validation HTTP (clé "assert") :
#   status_code     — code HTTP attendu (ex: 200)
#   body_contains   — chaîne attendue dans les premiers 4 Ko du body
#   header          — "Clé: Valeur" ou "Clé" (vérifie la présence)
sites:
  - url: https://google.com
    slo:
      http_p50_ms: 300
      http_p95_ms: 400
      dns_ms: 50
      stabilite_ratio: 5
      tls_ms: 80
    assert:
      status_code: 200
      body_contains: "google"

  - url: https://www.latencetech.com
    slo:
      http_p50_ms: 300
      http_p95_ms: 600
      dns_ms: 80

  - url: https://youtube.com
    slo:
      http_p50_ms: 250
      http_p95_ms: 500

  - url: https://apple.com
    # aucun SLO défini pour ce site
