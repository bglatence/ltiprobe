# ltiprobe.yaml — tool configuration
# Place this file in the project root or current working directory.
# Sites to measure are defined in sites.yaml (loaded automatically).

# Number of measurements per site
nb_measures: 10

# HTTP timeout in seconds
timeout: 10

# Display language: FR | EN | ES | DE | JA | ZH | PT
language: EN

# Output verbosity
#   basic — HTTP percentiles, DNS, stability, SLO
#   full  — basic + HTTP timing, DNS cache/TTL, protocol comparison,
#            Scoring Standards (MOS), Cache/CDN, TLS certificate, assertions
verbosity: full

# User impact analysis (optional)
#   resources_per_page — Q: compound latency estimator
#     Displays P(≥1 request exceeds Px on N resources per page)
#     Example: with 40 resources, P(≥1 > P99) ≈ 33%
#   requests_per_hour  — R: translate percentiles to users affected per hour
#     Example: P99 with 10 000 req/h → ~100 users/h affected
# resources_per_page: 40
# requests_per_hour: 10000

# Webhook alerts (optional)
#   on: slo_violation | degradation | all
# webhook:
#   url: https://hooks.slack.com/services/xxx/yyy/zzz
#   on: slo_violation
